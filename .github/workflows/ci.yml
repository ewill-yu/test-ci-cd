name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, format, test, audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

      - name: Vitest with coverage
        run: pnpm test:coverage

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high --prod

  deploy-staging:
    name: Deploy to staging (port 8081)
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    environment:
      name: staging
      url: http://localhost:8081
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t test-ci-cd-app:${{ github.sha }} \
            -t test-ci-cd-app:staging \
            .

      - name: Replace staging container
        env:
          APP_ENV: staging
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          docker rm -f test-ci-cd-app-staging 2>/dev/null || true
          docker run -d \
            --name test-ci-cd-app-staging \
            --restart unless-stopped \
            -p 8081:80 \
            -e APP_ENV \
            -e APP_TOKEN \
            -e APP_URL \
            test-ci-cd-app:${{ github.sha }}

      - name: Smoke test staging
        run: |
          sleep 3
          curl --fail --silent --show-error --retry 5 --retry-delay 2 http://localhost:8081 > /dev/null
          echo "Staging OK: http://localhost:8081"

  deploy-prod:
    name: Deploy to prod (port 8080)
    needs: deploy-staging
    runs-on: self-hosted
    environment:
      name: production
      url: http://localhost:8080
    steps:
      - name: Tag image as prod
        run: docker tag test-ci-cd-app:${{ github.sha }} test-ci-cd-app:prod

      - name: Replace prod container
        env:
          APP_ENV: production
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          docker rm -f test-ci-cd-app 2>/dev/null || true
          docker rm -f test-ci-cd-app-prod 2>/dev/null || true
          docker run -d \
            --name test-ci-cd-app-prod \
            --restart unless-stopped \
            -p 8080:80 \
            -e APP_ENV \
            -e APP_TOKEN \
            -e APP_URL \
            test-ci-cd-app:${{ github.sha }}

      - name: Smoke test prod
        run: |
          sleep 3
          curl --fail --silent --show-error --retry 5 --retry-delay 2 http://localhost:8080 > /dev/null
          echo "Prod OK: http://localhost:8080"
